<!doctype html>
<html>
  <head>
    <title>Додати тайтл - WATCHDIARY</title>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, user-scalable=no"
    />
    <link rel="stylesheet" href="/assets/css/main.css" />
    <link rel="icon" type="image/png" href="../images/favicon.png" />

    <style>
      .add-film-section {
        padding: 60px 20px;
        display: flex;
        justify-content: center;
      }
      .form-box {
        background-color: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 8px;
        padding: 40px;
        width: 100%;
        max-width: 700px;
      }
      .form-row {
        display: flex;
        align-items: center;
        margin-bottom: 25px;
      }
      .form-label {
        width: 120px;
        font-weight: bold;
        color: #ffffff;
        margin: 0;
        padding-right: 15px;
      }
      .form-input {
        flex: 1;
      }
      /* Стилізація радіокнопок під плашки */
      .type-options {
        display: flex;
        gap: 15px;
        flex: 1;
      }
      .type-options label {
        background: rgba(255, 255, 255, 0.1);
        padding: 8px 15px;
        border-radius: 4px;
        cursor: pointer;
        transition: 0.3s;
        margin: 0;
      }
      .type-options input[type="radio"] {
        display: none;
      }
      .type-options input[type="radio"]:checked + label {
        background-color: #f1c40f;
        color: #000000;
        font-weight: bold;
      }
      .submit-row {
        text-align: center;
        margin-top: 40px;
      }
      .btn-submit {
        background-color: #f1c40f !important;
        color: #000000 !important;
        border: none;
        padding: 12px 40px;
        font-size: 16px;
        font-weight: bold;
        border-radius: 5px;
        cursor: pointer;
        box-shadow: none !important;
      }
    </style>
  </head>
  <body class="no-sidebar">
    <div id="page-wrapper">
      <div id="header-placeholder"></div>

      <div id="main-wrapper">
        <section class="add-film-section">
          <div class="form-box">
            <form method="POST" action="#">
              <div class="form-row">
                <label class="form-label" for="title">Назва</label>
                <div class="form-input">
                  <input
                    type="text"
                    name="title"
                    id="title"
                    placeholder="Введіть назву..."
                    required
                  />
                </div>
              </div>

              <div class="form-row">
                <label class="form-label" for="year">Рік</label>
                <div class="form-input">
                  <input
                    type="number"
                    name="year"
                    id="year"
                    placeholder="2026"
                    min="1900"
                    max="2100"
                    required
                  />
                </div>
              </div>

              <div class="form-row">
                <label class="form-label">Тип</label>
                <div class="type-options">
                  <div>
                    <input
                      type="radio"
                      name="type"
                      id="type-film"
                      value="film"
                      checked
                    />
                    <label for="type-film">Фільм</label>
                  </div>
                  <div>
                    <input
                      type="radio"
                      name="type"
                      id="type-series"
                      value="series"
                    />
                    <label for="type-series">Серіал</label>
                  </div>
                  <div>
                    <input
                      type="radio"
                      name="type"
                      id="type-anime"
                      value="anime"
                    />
                    <label for="type-anime">Аніме</label>
                  </div>
                  <div>
                    <input
                      type="radio"
                      name="type"
                      id="type-cartoon"
                      value="cartoon"
                    />
                    <label for="type-cartoon">Мульт</label>
                  </div>
                </div>
              </div>

              <div class="submit-row">
                <button type="submit" class="btn-submit">Додати в базу</button>
              </div>
            </form>
          </div>
        </section>
      </div>

      <div id="footer-placeholder"></div>
    </div>

    <script src="/assets/js/jquery.min.js"></script>
    <script src="/assets/js/browser.min.js"></script>
    <script src="/assets/js/breakpoints.min.js"></script>
    <script src="/assets/js/util.js"></script>
    <script src="/assets/js/main.js"></script>

    <script>
      fetch("/components/header.html", { cache: "no-store" })
        .then((response) => response.text())
        .then((data) => {
          document.getElementById("header-placeholder").innerHTML = data;
        });

      fetch("/components/footer.html", { cache: "no-store" })
        .then((response) => response.text())
        .then((data) => {
          document.getElementById("footer-placeholder").innerHTML = data;
        });
    </script>
  </body>
</html>
