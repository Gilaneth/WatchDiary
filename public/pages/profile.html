<!doctype html>
<html lang="uk">
  <head>
    <title>Мій профіль - WATCHDIARY</title>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, user-scalable=no"
    />
    <link rel="stylesheet" href="../assets/css/main.css?v=48" />
    <link rel="icon" type="image/png" href="../images/favicon.png" />
    <style>
    @import url("./../reset.css");

    /* --- ВІДНОВЛЕННЯ НОРМАЛЬНИХ ШРИФТІВ --- */
    body, p, a, span, div {
        font-family: "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif !important;
    }
    h1, h2, h3, h4, h5, h6 {
        text-transform: none !important;
        letter-spacing: normal !important;
        font-family: "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif !important;
    }
    #logo, .badge-status {
        text-transform: uppercase !important;
        letter-spacing: 2px !important;
    }
    .button {
        text-transform: none !important;
        letter-spacing: 0.5px !important;
        font-family: "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif !important;
        font-weight: 600 !important;
    }

    .sidebar-btn {
        display: block;
        text-align: center;
        width: 100%;
        background-color: #222 !important;
        color: white !important;
        box-shadow: none !important;
        border: none !important;
        border-radius: 6px !important;
        margin-bottom: 10px;
        transition: all 0.2s ease-in-out;
    }
    .sidebar-btn:hover {
        background-color: #cc0000 !important;
        color: white !important;
    }

    /* Заголовки секцій */
    .profile-section-title {
        margin-bottom: 1.5em;
        text-align: left;
        background: #f8f8f8;
        padding: 15px 20px;
        border-radius: 8px;
        border-left: 5px solid #d52349;
        font-weight: 700 !important;
        font-size: 1.2em !important;
        color: #222 !important;
    }

    .media-card {
        position: relative;
        background: #ffffff !important;
        border-radius: 8px;
        overflow: hidden;
        margin-bottom: 30px;
        transition: transform 0.3s, box-shadow 0.3s;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08) !important;
        border: 1px solid #eeeeee !important;
        display: flex;
        flex-direction: column;
        height: 100%;
    }
    .media-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15) !important;
    }
    .media-image-container {
        position: relative;
        aspect-ratio: 2 / 3;
        overflow: hidden;
        background: #e6e6e6;
    }
    .media-image-container img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        color: transparent;
        text-indent: -10000px;
    }
    .badge-rating {
        position: absolute;
        top: 10px;
        right: 10px;
        background: rgba(241, 196, 15, 0.95) !important;
        color: #000 !important;
        padding: 4px 8px;
        border-radius: 4px;
        font-weight: bold;
        font-size: 13px;
        display: flex;
        align-items: center;
        gap: 4px;
        z-index: 2;
        font-family: "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif !important;
    }
    .badge-status {
        position: absolute;
        top: 10px;
        left: 10px;
        background: #cc0000 !important;
        color: #fff !important;
        padding: 4px 8px;
        border-radius: 4px;
        font-weight: bold;
        font-size: 11px;
        z-index: 2;
        font-family: "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif !important;
    }
    .media-info {
        padding: 15px;
        text-align: center;
        background: #f4f4f6 !important;
        border-top: 1px solid #eaeaea !important;
        flex-grow: 1;
        display: flex;
        flex-direction: column;
    }
    .media-info h3 {
        margin: 0 0 8px 0;
        font-size: 1.05em !important;
        line-height: 1.3;
    }
    .media-info h3 a {
        border: none !important;
        color: #222222 !important;
        text-decoration: none !important;
        font-weight: 700;
        display: block;
    }
    .media-info h3 a:hover {
        color: #d52349 !important;
        background: transparent !important;
    }
    .user-status {
        display: inline-block;
        padding: 4px 12px;
        border-radius: 12px;
        font-size: 0.85em;
        font-weight: 600 !important;
        margin-top: auto;
        font-family: "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif !important;
        letter-spacing: 0.5px !important;
        text-transform: none !important;
    }
    .status-watching, .status-planned, .status-completed {
        background: #222 !important;
        color: white !important;
    }
    </style>
  </head>
  <body class="no-sidebar is-preload">
    <div id="page-wrapper">
      <div id="header-placeholder"></div>

      <div id="main-wrapper" style="padding-top: 4em; padding-bottom: 4em">
        <div class="wrapper style1">
          <div class="inner">
            <section class="container">
              <div class="row">
                <div class="col-4 col-12-mobile" style="padding-right: 40px">
                  <header class="major" style="margin-bottom: 2em; text-align: left">
                    <h2 id="welcome" style="font-size: 2em !important; font-weight: bold !important; color: #222 !important;">
                      Вітаємо!
                    </h2>
                  </header>

                  <h3 style="margin-bottom: 1em; font-weight: bold !important; color: #444 !important;">
                    Моя бібліотека
                  </h3>

                  <div id="library-list" style="display: flex; flex-direction: column; gap: 10px; margin-top: 10px; margin-bottom: 2em;"></div>
                </div>

                <div class="col-8 col-12-mobile">
                  <h3 id="section-title" class="profile-section-title">Завантаження...</h3>
                  <div id="movies-grid" class="row"></div>
                </div>
              </div>
            </section>
          </div>
        </div>
      </div>

      <div id="footer-placeholder"></div>

      <script>
        fetch("/components/header.html", { cache: "no-store" })
          .then((response) => response.text())
          .then((data) => {
            document.getElementById("header-placeholder").innerHTML = data;
            if(typeof updateAuthSlot==="function") updateAuthSlot();
          });

        fetch("/components/footer.html", { cache: "no-store" })
          .then((response) => response.text())
          .then((data) => {
            document.getElementById("footer-placeholder").innerHTML = data;
          });
      </script>
      <script src="../assets/js/jquery.min.js"></script>
      <script src="../assets/js/jquery.dropotron.min.js"></script>
      <script src="../assets/js/browser.min.js"></script>
      <script src="../assets/js/breakpoints.min.js"></script>
      <script src="../assets/js/util.js"></script>
      <script src="../assets/js/main.js"></script>
      <script>
        const API = "http://localhost:5220";

        function decodeJwtPayload(token) {
            const base64 = token.split(".")[1].replace(/-/g, "+").replace(/_/g, "/");
            return JSON.parse(atob(base64));
        }

        function getCurrentUser() {
            const token = localStorage.getItem("watchdiary_token");
            if(!token) {
                window.location.href = "login.html";
                return null;
            }
            try {
                const payload = decodeJwtPayload(token);
                return {
                    token: token,
                    userId: Number(payload["http://schemas.xmlsoap.org/ws/2005/05/identity/claims/nameidentifier"] ?? payload.nameid ?? payload.sub),
                    username: payload['http://schemas.xmlsoap.org/ws/2005/05/identity/claims/name'] ?? 
                        payload.unique_name ?? 
                        payload.name ?? 
                        payload.username ?? 
                        payload.preferred_username ?? 
                        'Користувач'
                };
            } catch(e) {
                localStorage.removeItem("watchdiary_token");
                window.location.href = "login.html";
            }
        }

        function getStatusText(status) {
            const map = { 'Watching': 'Дивлюся', 'Planned': 'В планах', 'Completed': 'Переглянуто' };
            return map[status] || '';
        }

        function getStatusClass(status) {
            const map = { 'Watching': 'status-watching', 'Planned': 'status-planned', 'Completed': 'status-completed' };
            return map[status] || '';
        }

        function movieCard(movie) {
            const statusText = getStatusText(movie.status);
            const statusClass = getStatusClass(movie.status);
            return `
            <div class="col-4 col-12-mobile">
              <div class="media-card">
                <div class="media-image-container">
                  ${movie.type ? `<div class="badge-status">${movie.type}</div>` : ''}
                  ${movie.rating ? `<div class="badge-rating">★ ${movie.rating}</div>` : ''}
                  <a href="details-template.html?id=${movie.movieId}">
                    <img src="${movie.coverUrl ?? '../images/no-image.png'}" alt="${movie.movieName}">
                  </a>
                </div>
                <div class="media-info">
                  <h3><a href="details-template.html?id=${movie.movieId}">${movie.movieName}</a></h3>
                  ${statusText ? `<span class="user-status ${statusClass}">${statusText}</span>` : ''}
                </div>
              </div>
            </div>`;
        }

        function renderMovies(title, movies) {
            document.getElementById("section-title").textContent = title;
            const grid = document.getElementById("movies-grid");
            grid.innerHTML = "";
            if(!movies || movies.length === 0) {
                grid.innerHTML = '<div style="padding:20px;color:#777">Тут поки що нічого немає</div>';
                return;
            }
            movies.forEach(movie => { grid.innerHTML += movieCard(movie); });
        }

        function renderLibrary(watchList, collections) {
            const box = document.getElementById("library-list");
            box.innerHTML = "";
            const fav = document.createElement("a");
            fav.href = "#"; fav.className = "button sidebar-btn";
            fav.textContent = `Обране (${watchList.length})`;
            fav.onclick = e => { e.preventDefault(); renderMovies("Обране", watchList.map(x => x.movie ?? x)); };
            box.appendChild(fav);
            collections.forEach(c => {
                const btn = document.createElement("a");
                btn.href = "#"; btn.className = "button sidebar-btn";
                btn.textContent = `${c.collectionName} (${c.movies.length})`;
                btn.onclick = e => { e.preventDefault(); renderMovies(c.collectionName, c.movies); };
                box.appendChild(btn);
            });
        }

        async function loadProfile() {
            const user = getCurrentUser();
            if(!user) return;
            document.getElementById("welcome").textContent = `Вітаємо, ${user.username}!`;
            const headers = { Authorization: `Bearer ${user.token}` };
            try {
                const [watchRes, collectionRes] = await Promise.all([
                    fetch(`${API}/WatchList/user/${user.userId}`, {headers}),
                    fetch(`${API}/Collection/user/${user.userId}`, {headers})
                ]);
                const watchList = await watchRes.json();
                const collections = await collectionRes.json();
                renderLibrary(watchList, collections);
                renderMovies("Обране", watchList.map(x => x.movie ?? x));
            } catch(error) {
                console.error("Error loading profile:", error);
                document.getElementById("section-title").textContent = "Помилка завантаження";
            }
        }

        window.addEventListener("DOMContentLoaded", loadProfile);
      </script>
    </div>
  </body>
</html>
