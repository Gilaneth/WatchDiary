<!doctype html>
<html lang="uk">
  <head>
    <title>Головна - WATCHDIARY</title>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, user-scalable=no"
    />
    <link rel="stylesheet" href="assets/css/main.css?v=38" />
    <link rel="icon" type="image/png" href="images/favicon.png" />
    <style>
      #header-wrapper {
        background-color: rgba(31, 32, 35, 0.9) !important;
        background-image: none !important;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3) !important;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05) !important;
      }

      #header {
        background-color: rgba(20, 21, 23, 0.5) !important;
        background-image: none !important;
        border: 1px solid rgba(255, 255, 255, 0.05) !important;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2) !important;
      }

      #footer-wrapper {
        background-color: rgba(31, 32, 35, 0.9) !important;
        background-image: none !important;
        border-top: none !important;
        padding-top: 5em !important;
        padding-bottom: 5em !important;
      }

      #footer {
        background-color: transparent !important;
      }
      #footer-wrapper h2 {
        color: #ffffff !important;
        margin-bottom: 1.5em;
      }
      #footer-wrapper p,
      #footer-wrapper li {
        color: #bbbbbb !important;
      }
      #footer-wrapper a {
        color: #bbbbbb !important;
        text-decoration: none !important;
      }
      #footer-wrapper a:hover {
        color: #d52349 !important;
      }

      #copyright {
        margin-top: 3em !important;
        padding-top: 2em !important;
        border-top: 1px solid rgba(255, 255, 255, 0.05);
      }
      #copyright li {
        color: #888888 !important;
      }

      .media-card {
        position: relative;
        background: #ffffff !important;
        border-radius: 8px;
        overflow: hidden;
        margin-bottom: 30px;
        transition:
          transform 0.3s,
          box-shadow 0.3s;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08) !important;
        border: 1px solid #eeeeee !important;
      }
      .media-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15) !important;
      }
      .media-image-container {
        position: relative;
        aspect-ratio: 2 / 3;
        overflow: hidden;
        background: #e6e6e6;
      }

      .media-image-container img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        color: transparent;
        text-indent: -10000px;
      }

      .badge-rating {
        position: absolute;
        top: 10px;
        right: 10px;
        background: rgba(241, 196, 15, 0.95) !important;
        color: #000 !important;
        padding: 4px 8px;
        border-radius: 4px;
        font-weight: bold;
        font-size: 13px;
        display: flex;
        align-items: center;
        gap: 4px;
        z-index: 2;
      }
      .badge-status {
        position: absolute;
        top: 10px;
        left: 10px;
        background: #cc0000 !important;
        color: #fff !important;
        padding: 4px 8px;
        border-radius: 4px;
        font-weight: bold;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 1px;
        z-index: 2;
      }
      .media-info {
        padding: 15px;
        text-align: center;
        background: #f4f4f6 !important;
        border-top: 1px solid #eaeaea !important;
      }
      .media-info h3 {
        margin: 0 0 5px 0;
        font-size: 1.1em;
        line-height: 1.3;
      }
      .media-info h3 a {
        border: none !important;
        color: #222222 !important;
        text-decoration: none !important;
        font-weight: 700;
        display: block;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .media-info h3 a:hover {
        color: #d52349 !important;
        background: transparent !important;
      }
      .media-info p {
        margin: 0;
        color: #666666 !important;
        font-size: 0.9em;
      }
    </style>
  </head>
  <body class="no-sidebar is-preload">
    <div id="page-wrapper">
      <div id="header-placeholder"></div>

      <div id="main-wrapper" style="padding-top: 4em; padding-bottom: 4em">
        <div class="container">
          <header class="major" style="margin-bottom: 3em; text-align: center">
            <h2>Популярні тайтли</h2>
          </header>

          <div id="movies-grid" class="row"></div>
        </div>
      </div>

      <div id="footer-placeholder"></div>

      <script>
        fetch("/components/header.html", { cache: "no-store" })
          .then((response) => response.text())
          .then((data) => {
            document.getElementById("header-placeholder").innerHTML = data;
            if (typeof updateAuthSlot === "function") updateAuthSlot();
          });

        fetch("components/footer.html")
          .then((response) => response.text())
          .then((data) => {
            document.getElementById("footer-placeholder").innerHTML = data;
          });
      </script>
      <script src="assets/js/jquery.min.js"></script>
      <script src="assets/js/jquery.dropotron.min.js"></script>
      <script src="assets/js/browser.min.js"></script>
      <script src="assets/js/breakpoints.min.js"></script>
      <script src="assets/js/util.js"></script>
      <script src="assets/js/main.js"></script>
      <script>
        const API = "http://localhost:5220";

        function movieCard(movie) {
          return `
            <div class="col-3 col-6-medium col-12-small">
              <div class="media-card">
                <div class="media-image-container">
                  <a href="pages/details-template.html?id=${movie.movieId}">
                    <img src="${movie.coverUrl || 'images/no-image.png'}" alt="${movie.movieName}">
                  </a>
                </div>
                <div class="media-info">
                  <h3><a href="pages/details-template.html?id=${movie.movieId}">${movie.movieName}</a></h3>
                  ${movie.releaseYear ? `<p>(${movie.releaseYear})</p>` : ''}
                </div>
              </div>
            </div>
          `;
        }

        async function loadAllMovies() {
          try {
            const response = await fetch(`${API}/Movie`);
            if (!response.ok) throw new Error('Failed to load movies');
            const movies = await response.json();
            const grid = document.getElementById('movies-grid');
            grid.innerHTML = movies.map(movie => movieCard(movie)).join('');
          } catch (error) {
            console.error('Error loading movies:', error);
            document.getElementById('movies-grid').innerHTML = `
              <div class="col-12" style="text-align: center; padding: 40px; color: #666;">
                Не вдалося завантажити фільми. Спробуйте пізніше.
              </div>
            `;
          }
        }

        window.addEventListener('DOMContentLoaded', loadAllMovies);
      </script>
    </div>
  </body>
</html>
