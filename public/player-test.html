<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>WatchDiary — Player test</title>
        <style>
        canvas { display: none; }
        #output { font-size: 14px; white-space: pre-wrap; }
        </style>
    </head>
    <body>
        <h1 id="movie-title" data-movie-id="7">K-ON!</h1>
        <ul id="cast-list" style="font-size:14px; color:#555;"></ul>
        <video id="video" width="1280" height="720" controls>
            <source src="./movies/K-ON! 01.mov" type="video/mp4">
        </video>
        <canvas id="canvas"></canvas>
        <button id="btn" onclick="describeFrame()">Describe current frame</button>
        <div id="output"></div>
        <script>
        const MODEL = 'gemma4:e2b';
        const OLLAMA = 'http://localhost:11434';
        const API    = 'http://localhost:5220';

        let context = '';
        let castText = '';

        async function loadContext() {
            const titleElement = document.getElementById("movie-title");
            if (!titleElement || !titleElement.dataset.movieId) return;

            const movieId = titleElement.dataset.movieId;
            try {
                const res = await fetch(API + "/Movie/" + movieId);
                if (!res.ok) return;
                const movie = await res.json();
                if (movie.description) context = movie.description;
                renderCast(movie.actors);

                if (movie.actors && movie.actors.length > 0) {
                    castText = movie.actors
                        .map(a => a.characterName ? `${a.actorName} as ${a.characterName}` : a.actorName)
                        .join(", ");
                }
            } catch (err) {
                console.error("Could not load movie context:", err);
            }
        }

        function renderCast(actors) {
            const list = document.getElementById('cast-list');
            list.innerHTML = '';
            if (!actors || actors.length === 0) {
                list.innerHTML = '<li>No cast data</li>';
                return;
            }
            actors.forEach(a => {
                const li = document.createElement('li');
                li.textContent = a.characterName
                    ? a.actorName + ' as ' + a.characterName
                    : a.actorName;
                list.appendChild(li);
            });
        }

        async function describeFrame() {
            const video  = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const btn    = document.getElementById('btn');
            const output = document.getElementById('output');
            canvas.width  = Math.round(video.videoWidth  / 3);
            canvas.height = Math.round(video.videoHeight / 3);
            canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
            const base64 = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];
            btn.disabled = true;
            output.textContent = 'Thinking...';

            let fullContext = context;
            if (castText) {
                fullContext += (fullContext ? '\n' : '') + 'Cast/characters: ' + castText;
            }

            const prompt = fullContext
                ? 'Context: ' + fullContext + '\n\nDescribe what is happening in this video frame. Context is provided to help you describing the frame, fact check you response with it before answering the user. If there are any characters that you recognize, mention them by name or how they are called. Align the response with when given frame is happening in the plot.'
                : 'Describe what is happening in this video frame. Keep the style in a way of that user already aware of the film existance, as they are literally watching it right now. The user pressed the button to describe current frame because they are a bit unsure of what is happening on the screen.';

            const messages = [{
                role: 'user',
                content: prompt,
                images: [base64]
            }];
            try {
                const res = await fetch(OLLAMA + '/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ model: MODEL, stream: false, messages })
                });
                const data = await res.json();
                output.textContent = data.message?.content ?? JSON.stringify(data);
            } catch (err) {
                output.textContent = 'Error: ' + err.message;
            } finally {
                btn.disabled = false;
            }
        }

        window.addEventListener('DOMContentLoaded', loadContext);
        </script>
    </body>
</html>
