<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>WatchDiary — Player test</title>
        <style>
        canvas { display: none; }
        #output { font-size: 14px; white-space: pre-wrap; }
        </style>
    </head>
    <body>

        <video id="video" width="1280" height="720" controls>
            <source src="movies/big_buck_bunny_720p_h264.mov" type="video/mp4">
        </video>
        <canvas id="canvas"></canvas>
        <input id="context" type="text" placeholder="Context (optional)"
            style="display:block; width: 1280px;" />
        <button id="btn" onclick="describeFrame()">Describe current frame</button>
        <div id="output"></div>

        <script>
        const MODEL = 'hf.co/mradermacher/Qwen3-VL-8B-Abliterated-Caption-it-GGUF';
        const OLLAMA = 'http://localhost:11434';

        async function describeFrame() {
            const video  = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const btn    = document.getElementById('btn');
            const output = document.getElementById('output');

            canvas.width  = Math.round(video.videoWidth  / 2);
            canvas.height = Math.round(video.videoHeight / 2);
            canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);

            const base64 = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];
            const context = document.getElementById('context').value.trim();

            btn.disabled = true;
            output.textContent = 'Thinking...';

            const messages = [];
            const prompt = context
                ? 'Context: ' + context + '\n\nDescribe what is happening in this video frame. Context is provided to help you describing the frame, fact check you response with it before answering the user. If there are any characters that you recognize, mention them by name or how they are called. Align the response with when given frame is happening in the plot.'
                : 'Describe what is happening in this video frame.';
            messages.push({
                role: 'user',
                content: prompt,
                images: [base64]
            });

            try {
                const res = await fetch(OLLAMA + '/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ model: MODEL, stream: false, messages })
                });

                const data = await res.json();
                output.textContent = data.message?.content ?? JSON.stringify(data);
            } catch (err) {
                output.textContent = 'Error: ' + err.message;
            } finally {
                btn.disabled = false;
            }
        }
        </script>

    </body>
</html>
